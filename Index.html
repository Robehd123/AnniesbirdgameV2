<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Annie's Bird ID Game</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="Kingfishericon.png">
    <link rel="apple-touch-icon" href="Kingfishericon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- White card sits inside the yellow robin background -->
    <div id="game-container">

        <div id="top-bar">
            <h1>Annie's Bird ID Game</h1>
            <div id="progress-bar"></div>
            <div id="status-bar">
                <span id="score-display">Score: 0</span>
                <span id="count-display">Bird: 1/20</span>
            </div>
        </div>

        <div id="game-view">

            <div id="image-zone">
                <img id="bird-image" src="" alt="Bird to identify">
            </div>

            <div id="bottom-panel">

                <!-- STATE A: Guessing -->
                <div id="guess-zone">
                    <input
                        type="text"
                        id="guess-input"
                        placeholder="TYPE BIRD NAME..."
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="none"
                        spellcheck="false"
                        inputmode="text"
                    >
                    <div id="hint-options"></div>
                    <div class="button-row">
                        <button id="hint-btn"   onclick="showHint()">HINT? (10)</button>
                        <button id="submit-btn" onclick="checkGuess()">GUESS</button>
                        <button id="pass-btn"   onclick="passBird()">PASS</button>
                    </div>
                </div>

                <!-- STATE B: Result -->
                <div id="result-zone">
                    <p id="result-message"></p>
                    <p id="bird-fact"></p>
                    <button id="next-btn" onclick="nextBird()">NEXT BIRD &rarr;</button>
                </div>

            </div>
        </div>
    </div>

    <!-- Summary: same card shape, shown as overlay -->
    <div id="summary-view" style="display:none;">
        <h2 id="final-score-title">GAME OVER</h2>
        <p id="mastery-line"></p>

        <div id="passed-section" style="display:none;">
            <h3>Birds you passed on:</h3>
            <ul id="passed-list"></ul>
        </div>

        <div id="hinted-section" style="display:none;">
            <h3>Birds you used a hint on:</h3>
            <ul id="hinted-list"></ul>
        </div>

        <button onclick="restartGame()">START NEW GAME</button>
        <p id="footer">Lots of Love, Henry x</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
